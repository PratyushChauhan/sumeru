name: build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact: macos-aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact: macos-x86_64
          - platform: ubuntu-22.04
            args: ""
            artifact: linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: false

      - name: Strip bundled Wayland libs from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y libfuse2 || true
          chmod +x scripts/strip-appimage-wayland.sh
          ./scripts/strip-appimage-wayland.sh src-tauri/target/release/bundle/appimage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: funnelit-${{ matrix.artifact }}
          path: |
            src-tauri/target/**/release/bundle/**
            src-tauri/target/**/release/funnelit
            src-tauri/target/**/release/funnelit.exe
          if-no-files-found: warn
